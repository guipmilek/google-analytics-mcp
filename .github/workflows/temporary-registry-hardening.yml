name: Temporary Registry Hardening

on:
  push:
    branches:
      - feat/analytics-safety-status

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/analytics-safety-status
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Move dedicated gates into the registry
        run: |
          python - <<'PY'
          from pathlib import Path

          registry = Path('analytics_mcp/tools/admin/crud_registry.py')
          text = registry.read_text()
          text = text.replace('risk_gate=None,', 'risk_gate="custom_dimension",', 1)
          text = text.replace('risk_gate=None,', 'risk_gate="custom_metric",', 1)
          registry.write_text(text)

          hardened = Path('analytics_mcp/tools/admin/crud_hardened.py')
          text = hardened.read_text()
          text = text.replace('from dataclasses import replace\n', '')
          block = '''from analytics_mcp.tools.admin import crud_registry as _registry\n'''
          text = text.replace(block, '')
          block = '''\n\ndef _harden_resource_registry() -> None:\n    """Adds dedicated gates without changing the upstream registry layout."""\n    hardened = []\n    for spec in _registry._RESOURCE_SPECS:\n        if spec.name == "CustomDimension":\n            spec = replace(spec, risk_gate="custom_dimension")\n        elif spec.name == "CustomMetric":\n            spec = replace(spec, risk_gate="custom_metric")\n        hardened.append(spec)\n    _registry._RESOURCE_SPECS = tuple(hardened)\n\n\n_harden_resource_registry()\n'''
          if block not in text:
              raise SystemExit('Expected runtime registry patch was not found')
          text = text.replace(block, '\n')
          hardened.write_text(text)
          PY
      - name: Install Black
        run: python -m pip install black
      - name: Format changed files
        run: black -l 80 analytics_mcp/tools/admin/crud_registry.py analytics_mcp/tools/admin/crud_hardened.py
      - name: Commit registry hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analytics_mcp/tools/admin/crud_registry.py analytics_mcp/tools/admin/crud_hardened.py
          git commit -m "refactor(safety): define custom resource gates in registry"
          git push origin HEAD:feat/analytics-safety-status
