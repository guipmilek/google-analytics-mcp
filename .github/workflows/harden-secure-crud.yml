name: Harden Secure CRUD

on:
  push:
    branches:
      - feat/secure-admin-crud

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/secure-admin-crud

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Apply reviewed hardening patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          crud_path = Path("analytics_mcp/tools/admin/crud.py")
          crud = crud_path.read_text()

          marker = '''    if spec.parent_kind == "data_stream":
          '''
          insertion = '''    if spec.name == "DataStream":
              validate_stream_scope(resource_name, property_num, config)

              if spec.parent_kind == "data_stream":
          '''
          if insertion not in crud:
              if marker not in crud:
                  raise SystemExit("data stream marker not found")
              crud = crud.replace(marker, insertion, 1)

          new_execute = '''def _execute_one_sync(operation: Mapping[str, Any]) -> Dict[str, Any]:
              spec = get_resource_spec(str(operation["resource"]))
              action = str(operation["action"])
              request = _build_request(
                  spec,
                  action,
                  parent=operation.get("parent"),
                  resource_name=operation.get("resource_name"),
                  data=operation.get("data"),
                  update_mask=operation.get("update_mask"),
              )
              response = _invoke(spec, action, request, write=True)
              response_dict = None
              if response is not None and hasattr(type(response), "to_dict"):
                  response_dict = proto_to_dict(response)

              observed = None
              observed_name = operation.get("resource_name")
              if action == "create" and response_dict:
                  observed_name = response_dict.get("name")

              verification_status = "NOT_APPLICABLE"
              verification_error = None
              if observed_name:
                  try:
                      observed = _get_sync(spec, str(observed_name))
                      verification_status = "VERIFIED"
                  except google_exceptions.NotFound:
                      if action in {"archive", "delete"}:
                          verification_status = "VERIFIED"
                      else:
                          verification_status = "FAILED"
                          verification_error = {
                              "error_type": "NotFound",
                              "message": "Resource was not readable after mutation.",
                          }
                  except CrudSafetyError as exc:
                      if (
                          action in {"archive", "delete"}
                          and exc.code == "RESOURCE_NOT_FOUND"
                      ):
                          verification_status = "VERIFIED"
                      else:
                          verification_status = "FAILED"
                          verification_error = exc.as_dict()
                  except Exception as exc:
                      verification_status = "FAILED"
                      verification_error = {
                          "error_type": type(exc).__name__,
                          "message": str(exc),
                      }

              return {
                  "action": action,
                  "resource": spec.name,
                  "resource_name": observed_name,
                  "response": response_dict,
                  "post_execution_observation": observed,
                  "post_execution_verification_status": verification_status,
                  "post_execution_verification_error": verification_error,
              }
          '''
          pattern = re.compile(
              r"def _execute_one_sync\(.*?\n\n\nasync def analytics_list_mutable_resources",
              re.DOTALL,
          )
          match = pattern.search(crud)
          if not match:
              raise SystemExit("execute function not found")
          crud = (
              crud[: match.start()]
              + new_execute
              + "\n\n\nasync def analytics_list_mutable_resources"
              + crud[match.end() :]
          )

          old_final = '''    return {
              "property_id": property_num,
              "mode": "EXECUTE",
              "validation_status": "PRIOR_VALIDATION_VERIFIED",
              "execution_attempted": True,
              "executed": True,
              "execution_status": "SUCCEEDED",
              "atomic": False,
              "execution_strategy": "SEQUENTIAL_STOP_ON_FIRST_ERROR",
              "operation_count": len(normalized),
              "operations_attempted": len(normalized),
              "operations_completed": len(normalized),
              "operations_not_attempted": 0,
              "results": results,
              "operation_scope": _operation_scope(normalized),
              "verification": {
                  "post_execution_reads_performed": True,
                  "claims_limited_to_requested_resources": True,
              },
              **confirmation_info,
          }
          '''
          new_final = '''    verification_failures = [
              item
              for item in results
              if item["post_execution_verification_status"] == "FAILED"
          ]
              execution_status = (
              "SUCCEEDED"
              if not verification_failures
              else "SUCCEEDED_WITH_VERIFICATION_WARNINGS"
          )
              return {
              "property_id": property_num,
              "mode": "EXECUTE",
              "validation_status": "PRIOR_VALIDATION_VERIFIED",
              "execution_attempted": True,
              "executed": True,
              "execution_status": execution_status,
              "atomic": False,
              "execution_strategy": "SEQUENTIAL_STOP_ON_FIRST_ERROR",
              "operation_count": len(normalized),
              "operations_attempted": len(normalized),
              "operations_completed": len(normalized),
              "operations_not_attempted": 0,
              "results": results,
              "operation_scope": _operation_scope(normalized),
              "verification": {
                  "post_execution_reads_performed": True,
                  "all_requested_resources_verified": not verification_failures,
                  "verification_failure_count": len(verification_failures),
                  "claims_limited_to_requested_resources": True,
              },
              **confirmation_info,
          }
          '''
          if old_final not in crud:
              raise SystemExit("final response block not found")
          crud = crud.replace(old_final, new_final, 1)
          crud_path.write_text(crud)

          coordinator_path = Path("analytics_mcp/coordinator.py")
          coordinator = coordinator_path.read_text()
          old_error = '''            error_text = json.dumps(
                  {
                      "error": {
                          "type": type(exc).__name__,
                          "message": str(exc),
                      }
                  }
              )
          '''
          new_error = '''            if hasattr(exc, "as_dict"):
                  error_payload = exc.as_dict()
                  error_payload["type"] = type(exc).__name__
              else:
                  error_payload = {
                      "type": type(exc).__name__,
                      "message": str(exc),
                  }
              error_text = json.dumps({"error": error_payload})
          '''
          if old_error not in coordinator:
              raise SystemExit("coordinator error block not found")
          coordinator_path.write_text(coordinator.replace(old_error, new_error, 1))

          test_path = Path("tests/tools/admin/crud_engine_test.py")
          test_path.write_text('''# Copyright 2026 Google LLC

          import os
          import unittest
          from unittest.mock import patch

          from google.analytics import admin_v1beta
          from google.api_core import exceptions as google_exceptions

          from analytics_mcp.tools.admin import crud
          from analytics_mcp.tools.admin.crud_registry import get_resource_spec
          from analytics_mcp.tools.admin.crud_safety import load_safety_config


          class CrudEngineTest(unittest.TestCase):

              def _environment(self):
                  return {
                      "GOOGLE_ANALYTICS_ADMIN_MUTATIONS_ENABLED": "true",
                      "GOOGLE_ANALYTICS_ALLOWED_PROPERTY_IDS": "546475155",
                      "GOOGLE_ANALYTICS_ALLOWED_DATA_STREAM_IDS": "15297504355",
                      "GOOGLE_ANALYTICS_ALLOW_DATA_STREAM_CHANGES": "true",
                      "GOOGLE_ANALYTICS_CONFIRMATION_SECRET": "x" * 48,
                  }

              def test_data_stream_mutation_honors_stream_allowlist(self):
                  with patch.dict(os.environ, self._environment(), clear=True):
                      config = load_safety_config()
                      spec = get_resource_spec("DataStream")
                      accepted = crud._validate_resource_name(
                          spec,
                          "properties/546475155",
                          "546475155",
                          "properties/546475155/dataStreams/15297504355",
                          config,
                      )
                      self.assertTrue(accepted.endswith("15297504355"))
                      with self.assertRaises(Exception):
                          crud._validate_resource_name(
                              spec,
                              "properties/546475155",
                              "546475155",
                              "properties/546475155/dataStreams/1",
                              config,
                          )

              @patch.object(crud, "_build_request", return_value=object())
              @patch.object(crud, "_get_sync", side_effect=RuntimeError("read failed"))
              @patch.object(crud, "_invoke")
              def test_post_read_failure_does_not_reclassify_mutation(
                  self, invoke, unused_get, unused_build
              ):
                  invoke.return_value = admin_v1beta.CustomDimension(
                      name="properties/546475155/customDimensions/1"
                  )
                  result = crud._execute_one_sync(
                      {
                          "action": "update",
                          "resource": "CustomDimension",
                          "resource_name": (
                              "properties/546475155/customDimensions/1"
                          ),
                          "data": {"display_name": "Lead"},
                          "update_mask": ["display_name"],
                      }
                  )
                  self.assertEqual(
                      "FAILED", result["post_execution_verification_status"]
                  )
                  self.assertEqual("read failed", result[
                      "post_execution_verification_error"
                  ]["message"])

              @patch.object(crud, "_build_request", return_value=object())
              @patch.object(
                  crud,
                  "_get_sync",
                  side_effect=google_exceptions.NotFound("gone"),
              )
              @patch.object(crud, "_invoke", return_value=None)
              def test_not_found_verifies_delete(
                  self, unused_invoke, unused_get, unused_build
              ):
                  result = crud._execute_one_sync(
                      {
                          "action": "delete",
                          "resource": "KeyEvent",
                          "resource_name": "properties/546475155/keyEvents/1",
                          "data": {},
                          "update_mask": [],
                      }
                  )
                  self.assertEqual(
                      "VERIFIED", result["post_execution_verification_status"]
                  )


          if __name__ == "__main__":
              unittest.main()
          ''')
          PY

      - name: Install and verify
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -e .
          python -m pip install -q black pyfakefs coverage
          black -l 80 analytics_mcp tests
          python -m compileall -q analytics_mcp tests
          python -m unittest discover --buffer -s tests -p '*_test.py'

      - name: Commit hardening
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add analytics_mcp tests
          git commit -m "fix: harden CRUD post-execution verification"
          git push origin HEAD:feat/secure-admin-crud
