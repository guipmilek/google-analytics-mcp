      - name: Install package and checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install black pyfakefs coverage
      - name: Format
        run: black -l 80 analytics_mcp tests horizon_server.py
      - name: Compile
        run: python -m compileall -q analytics_mcp tests horizon_server.py
      - name: Tests
        run: python -m unittest discover --buffer -s tests -p '*_test.py'
      - name: Inspect
        run: fastmcp inspect horizon_server.py:mcp
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analytics_mcp tests ANALYTICS_CRUD.md README.md
          git commit -m "fix(safety): diagnose and rotate confirmation keys"
          git push origin HEAD:fix/confirmation-key-diagnostics
