name: Temporary Confirmation Fix

on:
  push:
    branches:
      - fix/confirmation-key-diagnostics

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/confirmation-key-diagnostics
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply focused confirmation fix
        run: |
          python - <<'PY'
          from pathlib import Path

          safety = Path('analytics_mcp/tools/admin/crud_safety.py')
          text = safety.read_text()

          text = text.replace(
              '_CONFIRMATION_SECRET_MINIMUM_BYTES = 32\n',
              '_CONFIRMATION_SECRET_MINIMUM_BYTES = 32\n'
              '_CONFIRMATION_TOKEN_VERSION = 2\n'
              '_PROCESS_INSTANCE_ID = secrets.token_hex(8)\n',
              1,
          )

          start = text.index('def safety_status_payload(')
          end = text.index('\ndef canonical_json(', start)
          replacement = '''def _secret_format_warnings(raw: str) -> list[str]:
              """Returns non-secret configuration warnings for a secret value."""
              warnings: list[str] = []
              if raw and raw != raw.strip():
                  warnings.append("SURROUNDING_WHITESPACE")
              if len(raw) >= 2 and raw[0] == raw[-1] and raw[0] in {"\\\"", "'"}:
                  warnings.append("WRAPPING_QUOTES")
              return warnings


          def _confirmation_key_id(secret: bytes) -> str:
              """Returns a non-secret identifier for a confirmation signing key."""
              material = b"google-analytics-mcp-confirmation-key:v1:" + secret
              return hashlib.sha256(material).hexdigest()[:16]


          def _confirmation_secret_metadata() -> Dict[str, Any]:
              """Returns secret-safe metadata for current and previous keys."""
              current_raw = os.getenv("GOOGLE_ANALYTICS_CONFIRMATION_SECRET", "")
              previous_raw = os.getenv(
                  "GOOGLE_ANALYTICS_CONFIRMATION_PREVIOUS_SECRET", ""
              )
              current = current_raw.encode("utf-8")
              previous = previous_raw.encode("utf-8")
              current_valid = len(current) >= _CONFIRMATION_SECRET_MINIMUM_BYTES
              previous_valid = (
                  bool(previous_raw)
                  and len(previous) >= _CONFIRMATION_SECRET_MINIMUM_BYTES
              )
              current_key_id = (
                  _confirmation_key_id(current) if current_valid else None
              )
              previous_key_id = (
                  _confirmation_key_id(previous) if previous_valid else None
              )
              if previous_key_id == current_key_id:
                  previous_key_id = None
              return {
                  "confirmation_secret_configured": current_valid,
                  "confirmation_secret_minimum_bytes": (
                      _CONFIRMATION_SECRET_MINIMUM_BYTES
                  ),
                  "confirmation_key_id": current_key_id,
                  "confirmation_secret_format_warnings": (
                      _secret_format_warnings(current_raw)
                  ),
                  "previous_confirmation_secret_configured": bool(previous_raw),
                  "previous_confirmation_secret_valid": previous_valid,
                  "previous_confirmation_key_id": previous_key_id,
                  "previous_confirmation_secret_format_warnings": (
                      _secret_format_warnings(previous_raw)
                  ),
              }


          def safety_status_payload(config: SafetyConfig | None = None) -> Dict[str, Any]:
              """Returns the public, secret-safe mutation safety status."""
              resolved = config or load_safety_config()
              secret_metadata = _confirmation_secret_metadata()
              return {
                  "runtime": "PYTHON_FASTMCP_HORIZON",
                  "process_instance_id": _PROCESS_INSTANCE_ID,
                  "mutations_enabled": resolved.mutations_enabled,
                  "gates": {
                      "create": resolved.allow_create,
                      "update": resolved.allow_update,
                      "delete": resolved.allow_delete,
                      "archive": resolved.allow_archive,
                      "property_update": resolved.allow_property_update,
                      "data_stream": resolved.allow_data_stream_changes,
                      "key_event": resolved.allow_key_event_changes,
                      "custom_dimension": resolved.allow_custom_dimension_changes,
                      "custom_metric": resolved.allow_custom_metric_changes,
                      "retention": resolved.allow_retention_changes,
                      "attribution": resolved.allow_attribution_changes,
                      "link": resolved.allow_link_changes,
                      "measurement_protocol_secret": (
                          resolved.allow_measurement_protocol_secret_changes
                      ),
                      "alpha_resources": resolved.allow_alpha_resources,
                  },
                  "allowlists": {
                      "account_ids": sorted(resolved.allowed_account_ids),
                      "property_ids": sorted(resolved.allowed_property_ids),
                      "data_stream_ids": sorted(resolved.allowed_data_stream_ids),
                      "google_ads_customer_ids": sorted(
                          resolved.allowed_google_ads_customer_ids
                      ),
                  },
                  "max_operations_per_request": resolved.max_operations,
                  "confirmation_ttl_seconds": resolved.confirmation_ttl_seconds,
                  **secret_metadata,
                  "operation_hash_version": _HASH_VERSION,
                  "confirmation_token_version": _CONFIRMATION_TOKEN_VERSION,
                  "replay_protection": "BEST_EFFORT_PROCESS_LOCAL",
                  "globally_single_use": False,
                  "cross_instance_valid": None,
                  "cross_instance_requirement": (
                      "MATCHING_CONFIRMATION_KEY_ID"
                  ),
                  "atomic": False,
                  "execution_strategy": "SEQUENTIAL_STOP_ON_FIRST_ERROR",
                  "admin_api_validate_only_supported": False,
                  "validation_kind": "CONNECTOR_PREFLIGHT",
              }


          async def analytics_safety_status() -> Dict[str, Any]:
              """Reports current mutation gates and allowlists without Google APIs."""
              return safety_status_payload()

          '''
          replacement = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in replacement.splitlines()
          ) + '\n'
          text = text[:start] + replacement + text[end + 1:]

          start = text.index('def _confirmation_secret()')
          end = text.index('\ndef _purge_replay_cache(', start)
          replacement = '''def _confirmation_secret() -> bytes:
              raw = os.getenv("GOOGLE_ANALYTICS_CONFIRMATION_SECRET", "")
              secret = raw.encode("utf-8")
              if len(secret) < _CONFIRMATION_SECRET_MINIMUM_BYTES:
                  raise CrudSafetyError(
                      "CONFIRMATION_SECRET_MISSING",
                      "GOOGLE_ANALYTICS_CONFIRMATION_SECRET must be at least 32 bytes.",
                  )
              return secret


          def _previous_confirmation_secret() -> bytes | None:
              raw = os.getenv("GOOGLE_ANALYTICS_CONFIRMATION_PREVIOUS_SECRET", "")
              if not raw:
                  return None
              secret = raw.encode("utf-8")
              if len(secret) < _CONFIRMATION_SECRET_MINIMUM_BYTES:
                  return None
              current = _confirmation_secret()
              if hmac.compare_digest(secret, current):
                  return None
              return secret


          def _confirmation_verification_keys() -> list[tuple[str, str, bytes]]:
              current = _confirmation_secret()
              keys = [("current", _confirmation_key_id(current), current)]
              previous = _previous_confirmation_secret()
              if previous is not None:
                  keys.append(("previous", _confirmation_key_id(previous), previous))
              return keys

          '''
          replacement = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in replacement.splitlines()
          ) + '\n'
          text = text[:start] + replacement + text[end + 1:]

          start = text.index('def issue_confirmation(')
          end = text.index('\ndef extract_property_ids(', start)
          replacement = '''def issue_confirmation(
              normalized_payload: Mapping[str, Any],
              property_id: str,
              ttl_seconds: int,
          ) -> Dict[str, Any]:
              """Issues an HMAC confirmation token for validated operations."""
              digest = operation_hash(normalized_payload)
              issued_at = int(time.time())
              expires_at = issued_at + ttl_seconds
              secret = _confirmation_secret()
              key_id = _confirmation_key_id(secret)
              token_payload: Dict[str, Any] = {
                  "exp": expires_at,
                  "hash": digest,
                  "iat": issued_at,
                  "iid": _PROCESS_INSTANCE_ID,
                  "kid": key_id,
                  "nonce": _b64url_encode(secrets.token_bytes(12)),
                  "pid": property_id,
                  "v": _CONFIRMATION_TOKEN_VERSION,
                  "verb": "EXECUTE",
              }
              account_id = normalized_payload.get("account_id")
              if isinstance(account_id, str) and account_id:
                  token_payload["aid"] = account_id
              parent_hash = normalized_payload.get(
                  "property_parent_precondition_hash"
              )
              if isinstance(parent_hash, str) and parent_hash:
                  token_payload["pph"] = parent_hash

              encoded_payload = _b64url_encode(
                  canonical_json(token_payload).encode("utf-8")
              )
              signature = _b64url_encode(
                  hmac.new(
                      secret,
                      encoded_payload.encode("ascii"),
                      hashlib.sha256,
                  ).digest()
              )
              confirmation = f"EXECUTE {digest}.{encoded_payload}.{signature}"
              return {
                  "operation_hash": digest,
                  "operation_hash_version": _HASH_VERSION,
                  "confirmation_token_version": _CONFIRMATION_TOKEN_VERSION,
                  "confirmation_key_id": key_id,
                  "confirmation_issued_by_process_instance_id": (
                      _PROCESS_INSTANCE_ID
                  ),
                  "required_confirmation": confirmation,
                  "confirmation_expires_at_epoch": expires_at,
                  "validation_receipt": {
                      "expires_at_epoch": expires_at,
                      "confirmation_key_id": key_id,
                      "issued_by_process_instance_id": _PROCESS_INSTANCE_ID,
                      "cross_instance_valid": None,
                      "cross_instance_requirement": (
                          "MATCHING_CONFIRMATION_KEY_ID"
                      ),
                      "replay_protection": "BEST_EFFORT_PROCESS_LOCAL",
                      "globally_single_use": False,
                  },
              }


          def _decode_confirmation_payload(encoded_payload: str) -> Dict[str, Any]:
              decoded = _b64url_decode_canonical(encoded_payload)
              try:
                  payload = json.loads(decoded.decode("utf-8"))
              except (UnicodeDecodeError, json.JSONDecodeError) as exc:
                  raise CrudSafetyError(
                      "INVALID_CONFIRMATION", "Confirmation payload is invalid."
                  ) from exc
              if not isinstance(payload, dict):
                  raise CrudSafetyError(
                      "INVALID_CONFIRMATION",
                      "Confirmation payload must be a JSON object.",
                  )
              return payload


          def _select_confirmation_key(
              payload: Mapping[str, Any],
              encoded_payload: str,
              signature: str,
          ) -> tuple[str, str]:
              keys = _confirmation_verification_keys()
              observed_key_id = payload.get("kid")
              if observed_key_id is not None:
                  if not isinstance(observed_key_id, str) or not observed_key_id:
                      raise CrudSafetyError(
                          "INVALID_CONFIRMATION",
                          "Confirmation key identifier is invalid.",
                      )
                  matching = [item for item in keys if item[1] == observed_key_id]
                  if not matching:
                      raise CrudSafetyError(
                          "CONFIRMATION_KEY_MISMATCH",
                          "Confirmation was signed by a different configured key.",
                          {
                              "observed_confirmation_key_id": observed_key_id,
                              "current_confirmation_key_id": keys[0][1],
                              "previous_confirmation_key_id": (
                                  keys[1][1] if len(keys) > 1 else None
                              ),
                              "verification_process_instance_id": (
                                  _PROCESS_INSTANCE_ID
                              ),
                          },
                      )
                  candidates = matching
              else:
                  candidates = keys

              for source, key_id, secret in candidates:
                  expected_signature = _b64url_encode(
                      hmac.new(
                          secret,
                          encoded_payload.encode("ascii"),
                          hashlib.sha256,
                      ).digest()
                  )
                  if hmac.compare_digest(signature, expected_signature):
                      return source, key_id

              raise CrudSafetyError(
                  "INVALID_CONFIRMATION",
                  "Confirmation signature is invalid for the declared key.",
                  {
                      "observed_confirmation_key_id": observed_key_id,
                      "verification_process_instance_id": _PROCESS_INSTANCE_ID,
                  },
              )


          def _verify_confirmation(
              confirmation: str,
              normalized_payload: Mapping[str, Any],
              property_id: str,
              *,
              register_replay: bool,
          ) -> Dict[str, Any]:
              try:
                  verb, token = confirmation.split(" ", 1)
                  digest, encoded_payload, signature = token.split(".", 2)
              except ValueError as exc:
                  raise CrudSafetyError(
                      "INVALID_CONFIRMATION",
                      "Confirmation must use 'EXECUTE <hash>.<payload>.<signature>'.",
                  ) from exc
              if verb != "EXECUTE" or not _HASH_RE.fullmatch(digest):
                  raise CrudSafetyError(
                      "INVALID_CONFIRMATION",
                      "Confirmation prefix or hash is invalid.",
                  )

              payload = _decode_confirmation_payload(encoded_payload)
              key_source, verified_key_id = _select_confirmation_key(
                  payload, encoded_payload, signature
              )

              token_version = payload.get("v")
              if token_version not in {1, _CONFIRMATION_TOKEN_VERSION}:
                  raise CrudSafetyError(
                      "INVALID_CONFIRMATION",
                      "Confirmation token version is not supported.",
                      {"confirmation_token_version": token_version},
                  )

              expected_hash = operation_hash(normalized_payload)
              now = int(time.time())
              expected = {
                  "hash": expected_hash,
                  "pid": property_id,
                  "verb": "EXECUTE",
              }
              observed = {key: payload.get(key) for key in expected}

              expected_account = normalized_payload.get("account_id")
              expected_parent_hash = normalized_payload.get(
                  "property_parent_precondition_hash"
              )
              if (
                  expected_account is not None
                  and payload.get("aid") != expected_account
              ):
                  raise CrudSafetyError(
                      "PROPERTY_PARENT_ACCOUNT_CHANGED",
                      "The property parent account changed after validation.",
                      {
                          "expected_account_id": payload.get("aid"),
                          "observed_account_id": expected_account,
                      },
                  )
              if (
                  expected_parent_hash is not None
                  and payload.get("pph") != expected_parent_hash
              ):
                  raise CrudSafetyError(
                      "PROPERTY_PARENT_ACCOUNT_CHANGED",
                      "The property parent account changed after validation.",
                  )

              if digest != expected_hash or observed != expected:
                  raise CrudSafetyError(
                      "CONFIRMATION_MISMATCH",
                      "Confirmation does not match the normalized operation payload.",
                      {"expected": expected, "observed": observed},
                  )
              if not isinstance(payload.get("exp"), int) or payload["exp"] < now:
                  raise CrudSafetyError(
                      "CONFIRMATION_EXPIRED",
                      "Confirmation has expired and the operation must be revalidated.",
                  )
              if (
                  not isinstance(payload.get("iat"), int)
                  or payload["iat"] > now + 60
              ):
                  raise CrudSafetyError(
                      "INVALID_CONFIRMATION",
                      "Confirmation issue time is invalid.",
                  )
              nonce = payload.get("nonce")
              if not isinstance(nonce, str) or not nonce:
                  raise CrudSafetyError(
                      "INVALID_CONFIRMATION", "Confirmation nonce is missing."
                  )

              fingerprint = hashlib.sha256(
                  confirmation.encode("utf-8")
              ).hexdigest()[:16]
              if register_replay:
                  with _REPLAY_LOCK:
                      _purge_replay_cache(now)
                      if fingerprint in _USED_CONFIRMATIONS:
                          raise CrudSafetyError(
                              "CONFIRMATION_REPLAYED",
                              "Confirmation was already registered by this process.",
                          )
                      _USED_CONFIRMATIONS[fingerprint] = payload["exp"]

              return {
                  "confirmation_verified": True,
                  "confirmation_registered_before_api_call": register_replay,
                  "confirmation_token_fingerprint": fingerprint,
                  "confirmation_token_version": token_version,
                  "confirmation_key_id": verified_key_id,
                  "confirmation_key_source": key_source,
                  "confirmation_issued_by_process_instance_id": payload.get("iid"),
                  "confirmation_verified_by_process_instance_id": (
                      _PROCESS_INSTANCE_ID
                  ),
                  "operation_hash": expected_hash,
                  "operation_hash_version": _HASH_VERSION,
              }


          def verify_and_register_confirmation(
              confirmation: str,
              normalized_payload: Mapping[str, Any],
              property_id: str,
          ) -> Dict[str, Any]:
              """Verifies and registers a confirmation before an API call."""
              return _verify_confirmation(
                  confirmation,
                  normalized_payload,
                  property_id,
                  register_replay=True,
              )


          async def analytics_confirmation_diagnostics() -> Dict[str, Any]:
              """Runs a local confirmation round trip without Google API calls."""
              synthetic_payload = {
                  "property_id": "diagnostic",
                  "account_id": "diagnostic",
                  "property_parent_precondition_hash": "0" * 64,
                  "operations": [],
                  "atomic": False,
                  "execution_strategy": "SEQUENTIAL_STOP_ON_FIRST_ERROR",
              }
              issued = issue_confirmation(synthetic_payload, "diagnostic", 60)
              verified = _verify_confirmation(
                  issued["required_confirmation"],
                  synthetic_payload,
                  "diagnostic",
                  register_replay=False,
              )
              metadata = _confirmation_secret_metadata()
              return {
                  "runtime": "PYTHON_FASTMCP_HORIZON",
                  "process_instance_id": _PROCESS_INSTANCE_ID,
                  **metadata,
                  "confirmation_token_version": _CONFIRMATION_TOKEN_VERSION,
                  "self_test": {
                      "issued": True,
                      "verified": verified["confirmation_verified"],
                      "replay_registered": False,
                      "confirmation_key_id": verified["confirmation_key_id"],
                      "confirmation_key_source": verified[
                          "confirmation_key_source"
                      ],
                      "issued_by_process_instance_id": verified[
                          "confirmation_issued_by_process_instance_id"
                      ],
                      "verified_by_process_instance_id": verified[
                          "confirmation_verified_by_process_instance_id"
                      ],
                  },
                  "cross_instance_valid": None,
                  "cross_instance_requirement": (
                      "MATCHING_CONFIRMATION_KEY_ID"
                  ),
                  "supported_rotation": {
                      "previous_secret_environment_variable": (
                          "GOOGLE_ANALYTICS_CONFIRMATION_PREVIOUS_SECRET"
                      ),
                      "previous_key_verification_enabled": (
                          metadata["previous_confirmation_secret_valid"]
                      ),
                  },
                  "failure_codes": {
                      "different_key": "CONFIRMATION_KEY_MISMATCH",
                      "corrupted_signature": "INVALID_CONFIRMATION",
                      "expired": "CONFIRMATION_EXPIRED",
                      "replayed_in_process": "CONFIRMATION_REPLAYED",
                  },
              }

          '''
          replacement = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in replacement.splitlines()
          ) + '\n'
          text = text[:start] + replacement + text[end + 1:]
          safety.write_text(text)

          hardened = Path('analytics_mcp/tools/admin/crud_hardened.py')
          text = hardened.read_text()
          text = text.replace(
              '    CrudSafetyError,\n    analytics_safety_status,\n',
              '    CrudSafetyError,\n    analytics_confirmation_diagnostics,\n'
              '    analytics_safety_status,\n',
              1,
          )
          hardened.write_text(text)

          horizon = Path('analytics_mcp/horizon.py')
          text = horizon.read_text()
          text = text.replace(
              '    analytics_batch_operations,\n',
              '    analytics_batch_operations,\n'
              '    analytics_confirmation_diagnostics,\n',
              1,
          )
          text = text.replace(
              '    (analytics_safety_status, None),\n',
              '    (analytics_safety_status, None),\n'
              '    (analytics_confirmation_diagnostics, None),\n',
              1,
          )
          horizon.write_text(text)

          coordinator = Path('analytics_mcp/coordinator.py')
          text = coordinator.read_text()
          text = text.replace(
              '    analytics_batch_operations,\n',
              '    analytics_batch_operations,\n'
              '    analytics_confirmation_diagnostics,\n',
              1,
          )
          text = text.replace(
              '    FunctionTool(analytics_safety_status),\n',
              '    FunctionTool(analytics_safety_status),\n'
              '    FunctionTool(analytics_confirmation_diagnostics),\n',
              1,
          )
          coordinator.write_text(text)

          horizon_test = Path('tests/horizon_test.py')
          text = horizon_test.read_text()
          text = text.replace(
              '                "analytics_safety_status",\n',
              '                "analytics_safety_status",\n'
              '                "analytics_confirmation_diagnostics",\n',
              1,
          )
          text = text.replace(
              '        self.assertTrue(\n'
              '            components["analytics_safety_status"].annotations.readOnlyHint\n'
              '        )\n',
              '        self.assertTrue(\n'
              '            components["analytics_safety_status"].annotations.readOnlyHint\n'
              '        )\n'
              '        self.assertTrue(\n'
              '            components[\n'
              '                "analytics_confirmation_diagnostics"\n'
              '            ].annotations.readOnlyHint\n'
              '        )\n',
              1,
          )
          horizon_test.write_text(text)

          status_test = Path('tests/tools/admin/safety_status_test.py')
          text = status_test.read_text()
          insertion = '''
              def _confirmation_payload(self):
                  return {
                      "property_id": "546475155",
                      "account_id": "401804063",
                      "property_parent_precondition_hash": "a" * 64,
                      "operations": [],
                      "atomic": False,
                      "execution_strategy": "SEQUENTIAL_STOP_ON_FIRST_ERROR",
                  }

              def test_status_reports_key_and_instance_metadata(self):
                  environment = self._enabled_environment()
                  with patch.dict(os.environ, environment, clear=True):
                      result = asyncio.run(crud_safety.analytics_safety_status())

                  self.assertEqual(16, len(result["confirmation_key_id"]))
                  self.assertEqual(16, len(result["process_instance_id"]))
                  self.assertEqual(2, result["confirmation_token_version"])
                  self.assertIsNone(result["cross_instance_valid"])
                  self.assertEqual(
                      "MATCHING_CONFIRMATION_KEY_ID",
                      result["cross_instance_requirement"],
                  )
                  self.assertFalse(
                      result["previous_confirmation_secret_configured"]
                  )

              def test_diagnostics_round_trip_does_not_register_replay(self):
                  environment = self._enabled_environment()
                  crud_safety._USED_CONFIRMATIONS.clear()
                  with patch.dict(os.environ, environment, clear=True):
                      result = asyncio.run(
                          crud_safety.analytics_confirmation_diagnostics()
                      )

                  self.assertTrue(result["self_test"]["issued"])
                  self.assertTrue(result["self_test"]["verified"])
                  self.assertFalse(result["self_test"]["replay_registered"])
                  self.assertEqual({}, crud_safety._USED_CONFIRMATIONS)
                  serialized = json.dumps(result)
                  self.assertNotIn("x" * 48, serialized)
                  self.assertNotIn("required_confirmation", serialized)

              def test_new_receipt_declares_key_and_instance(self):
                  environment = self._enabled_environment()
                  with patch.dict(os.environ, environment, clear=True):
                      receipt = crud_safety.issue_confirmation(
                          self._confirmation_payload(), "546475155", 900
                      )

                  self.assertEqual(2, receipt["confirmation_token_version"])
                  self.assertEqual(16, len(receipt["confirmation_key_id"]))
                  self.assertIsNone(
                      receipt["validation_receipt"]["cross_instance_valid"]
                  )
                  self.assertEqual(
                      "MATCHING_CONFIRMATION_KEY_ID",
                      receipt["validation_receipt"][
                          "cross_instance_requirement"
                      ],
                  )

              def test_changed_key_returns_specific_mismatch(self):
                  old_environment = self._enabled_environment()
                  old_environment["GOOGLE_ANALYTICS_CONFIRMATION_SECRET"] = (
                      "old-confirmation-secret-" + "a" * 32
                  )
                  with patch.dict(os.environ, old_environment, clear=True):
                      confirmation = crud_safety.issue_confirmation(
                          self._confirmation_payload(), "546475155", 900
                      )["required_confirmation"]

                  new_environment = self._enabled_environment()
                  new_environment["GOOGLE_ANALYTICS_CONFIRMATION_SECRET"] = (
                      "new-confirmation-secret-" + "b" * 32
                  )
                  with patch.dict(os.environ, new_environment, clear=True):
                      with self.assertRaises(
                          crud_safety.CrudSafetyError
                      ) as context:
                          crud_safety.verify_and_register_confirmation(
                              confirmation,
                              self._confirmation_payload(),
                              "546475155",
                          )

                  self.assertEqual(
                      "CONFIRMATION_KEY_MISMATCH", context.exception.code
                  )
                  self.assertIn(
                      "observed_confirmation_key_id",
                      context.exception.details,
                  )

              def test_previous_key_supports_controlled_rotation(self):
                  old_secret = "old-confirmation-secret-" + "a" * 32
                  new_secret = "new-confirmation-secret-" + "b" * 32
                  old_environment = self._enabled_environment()
                  old_environment["GOOGLE_ANALYTICS_CONFIRMATION_SECRET"] = (
                      old_secret
                  )
                  with patch.dict(os.environ, old_environment, clear=True):
                      confirmation = crud_safety.issue_confirmation(
                          self._confirmation_payload(), "546475155", 900
                      )["required_confirmation"]

                  rotated_environment = self._enabled_environment()
                  rotated_environment["GOOGLE_ANALYTICS_CONFIRMATION_SECRET"] = (
                      new_secret
                  )
                  rotated_environment[
                      "GOOGLE_ANALYTICS_CONFIRMATION_PREVIOUS_SECRET"
                  ] = old_secret
                  with patch.dict(os.environ, rotated_environment, clear=True):
                      verified = crud_safety.verify_and_register_confirmation(
                          confirmation,
                          self._confirmation_payload(),
                          "546475155",
                      )

                  self.assertTrue(verified["confirmation_verified"])
                  self.assertEqual(
                      "previous", verified["confirmation_key_source"]
                  )

              def test_corrupted_signature_remains_invalid_confirmation(self):
                  environment = self._enabled_environment()
                  with patch.dict(os.environ, environment, clear=True):
                      confirmation = crud_safety.issue_confirmation(
                          self._confirmation_payload(), "546475155", 900
                      )["required_confirmation"]
                      prefix, signature = confirmation.rsplit(".", 1)
                      replacement = "A" if signature[-1] != "A" else "B"
                      corrupted = prefix + "." + signature[:-1] + replacement
                      with self.assertRaises(
                          crud_safety.CrudSafetyError
                      ) as context:
                          crud_safety.verify_and_register_confirmation(
                              corrupted,
                              self._confirmation_payload(),
                              "546475155",
                          )

                  self.assertEqual("INVALID_CONFIRMATION", context.exception.code)
          '''
          insertion = '\n'.join(
              line[14:] if line.startswith('              ') else line
              for line in insertion.splitlines()
          )
          marker = '\n\nif __name__ == "__main__":\n'
          if marker not in text:
              raise SystemExit('safety status test insertion marker missing')
          text = text.replace(marker, insertion + marker, 1)
          status_test.write_text(text)

          crud_docs = Path('ANALYTICS_CRUD.md')
          text = crud_docs.read_text()
          text = text.replace(
              '- `analytics_safety_status`\n',
              '- `analytics_safety_status`\n'
              '- `analytics_confirmation_diagnostics`\n',
              1,
          )
          text = text.replace(
              'The tool never returns the confirmation secret, ADC JSON, OAuth secrets, or\n'
              'access tokens.\n',
              'The tool never returns the confirmation secret, ADC JSON, OAuth secrets, or\n'
              'access tokens. It reports a non-secret confirmation key identifier and a\n'
              'process instance identifier so operators can detect inconsistent replicas.\n\n'
              '`analytics_confirmation_diagnostics` performs a synthetic issue/verify round\n'
              'trip entirely in process. It does not return a confirmation token, register a\n'
              'replay, call Google APIs, run a production preflight, or mutate resources.\n',
              1,
          )
          text = text.replace(
              'Receipts are cross-instance verifiable while the secret remains identical, but\n'
              'replay blocking is process-local best effort:\n',
              'Receipts include a non-secret `confirmation_key_id`. Cross-instance validity is\n'
              'not asserted unconditionally; it requires the verifier to report the matching\n'
              'key identifier. Replay blocking remains process-local best effort:\n',
              1,
          )
          text = text.replace(
              '  "replay_protection": "BEST_EFFORT_PROCESS_LOCAL",\n'
              '  "globally_single_use": false\n',
              '  "cross_instance_valid": null,\n'
              '  "cross_instance_requirement": "MATCHING_CONFIRMATION_KEY_ID",\n'
              '  "replay_protection": "BEST_EFFORT_PROCESS_LOCAL",\n'
              '  "globally_single_use": false\n',
              1,
          )
          text = text.replace(
              'GOOGLE_ANALYTICS_CONFIRMATION_SECRET=<random secret of at least 32 bytes>\n',
              'GOOGLE_ANALYTICS_CONFIRMATION_SECRET=<random secret of at least 32 bytes>\n'
              '# Optional only during controlled key rotation:\n'
              'GOOGLE_ANALYTICS_CONFIRMATION_PREVIOUS_SECRET=<previous secret>\n',
              1,
          )
          text = text.replace(
              'The confirmation secret must be configured directly in the deployment\n'
              'platform. Do not reuse the Google Ads confirmation secret.\n',
              'The confirmation secret must be configured directly in the deployment\n'
              'platform and must be identical across active replicas. Do not reuse the\n'
              'Google Ads confirmation secret. During controlled rotation, place the old\n'
              'value temporarily in `GOOGLE_ANALYTICS_CONFIRMATION_PREVIOUS_SECRET`, deploy\n'
              'the new current secret everywhere, wait for old receipts to expire, then remove\n'
              'the previous secret.\n',
              1,
          )
          crud_docs.write_text(text)

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace(
              '- `analytics_safety_status`\n',
              '- `analytics_safety_status`\n'
              '- `analytics_confirmation_diagnostics`\n',
              1,
          )
          text = text.replace(
              '`analytics_safety_status` is read-only, reloads the environment on every call,\n'
              'and never exposes the confirmation secret, ADC JSON, OAuth credentials, or\n'
              'tokens.\n',
              '`analytics_safety_status` and `analytics_confirmation_diagnostics` are\n'
              'read-only. They expose only non-secret key and process identifiers, never the\n'
              'confirmation secret, ADC JSON, OAuth credentials, tokens, or synthetic\n'
              'confirmations. Cross-instance verification requires matching key IDs.\n',
              1,
          )
          readme.write_text(text)
