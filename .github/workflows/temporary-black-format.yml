name: Temporary Black Formatter

on:
  push:
    branches:
      - feat/analytics-safety-status

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/analytics-safety-status
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Black
        run: python -m pip install black
      - name: Format changed Python files
        run: black -l 80 analytics_mcp tests horizon_server.py
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analytics_mcp tests horizon_server.py
          if git diff --cached --quiet; then
            echo "No formatting changes required."
          else
            git commit -m "style: format Analytics safety changes"
            git push origin HEAD:feat/analytics-safety-status
          fi
