name: Secure Analytics CRUD

on:
  push:
    branches:
      - feat/secure-admin-crud
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install black pyfakefs coverage

      - name: Compile
        run: python -m compileall -q analytics_mcp tests

      - name: Formatting
        run: black --check -l 80 analytics_mcp tests

      - name: Tests
        run: |
          python -m unittest discover --buffer -s tests -p '*_test.py'
