name: Autoformat Secure CRUD

on:
  push:
    branches:
      - feat/secure-admin-crud

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/secure-admin-crud

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Format
        run: |
          python -m pip install -q black
          black -l 80 analytics_mcp tests

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add analytics_mcp tests
          git commit -m "style: format secure Analytics CRUD"
          git push origin HEAD:feat/secure-admin-crud
